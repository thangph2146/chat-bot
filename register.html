<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Trợ lý AI HUB</title>
    <link rel="icon" href="https://tuyensinh.hub.edu.vn/images/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="tailwind.config.js"></script>
    <style>
        body {
            background-color: #f3f4f6;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .input-icon {
            color: #9ca3af; /* gray-400 */
        }
        input:focus ~ .input-icon { /* Use sibling selector */
             color: #b42c1c; /* primary-600 */
        }
    </style>
</head>
<body class="font-sans flex items-center justify-center min-h-screen px-4 bg-gradient-to-br from-primary-50 via-secondary-50 to-white">
    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-primary-600 animate-fade-in">
        <div class="flex justify-center mb-8">
            <img src="logo/logo.png" alt="Logo HUB" class="h-20 transition-transform duration-300 hover:scale-105" style="width: 15rem; height: 100%">
        </div>
        <h2 class="text-3xl font-bold text-center text-primary-600 mb-8">Tạo tài khoản mới</h2>

        <form id="registerForm" class="space-y-6">
            <div class="relative">
                <label for="fullName" class="sr-only">Họ và tên</label>
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="h-5 w-5 input-icon transition-colors duration-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                    </svg>
                </span>
                <input type="text" id="fullName" name="fullName" required
                       class="w-full pl-10 pr-4 py-3 border border-secondary-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 shadow-sm transition-all duration-300 placeholder-secondary-400"
                       placeholder="Họ và tên đầy đủ">
            </div>
            <div class="relative">
                <label for="email" class="sr-only">Email</label>
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="h-5 w-5 input-icon transition-colors duration-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                        <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
                    </svg>
                </span>
                <input type="email" id="email" name="email" required
                       class="w-full pl-10 pr-4 py-3 border border-secondary-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 shadow-sm transition-all duration-300 placeholder-secondary-400"
                       placeholder="Địa chỉ email">
            </div>
            <div class="relative">
                <label for="password" class="sr-only">Mật khẩu</label>
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="h-5 w-5 input-icon transition-colors duration-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                    </svg>
                </span>
                <input type="password" id="password" name="password" required
                       class="w-full pl-10 pr-4 py-3 border border-secondary-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 shadow-sm transition-all duration-300 placeholder-secondary-400"
                       placeholder="Tạo mật khẩu (ít nhất 6 ký tự)" minlength="6">
            </div>
            <div class="relative">
                <label for="confirmPassword" class="sr-only">Xác nhận mật khẩu</label>
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="h-5 w-5 input-icon transition-colors duration-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                    </svg>
                </span>
                <input type="password" id="confirmPassword" name="confirmPassword" required
                       class="w-full pl-10 pr-4 py-3 border border-secondary-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 shadow-sm transition-all duration-300 placeholder-secondary-400"
                       placeholder="Nhập lại mật khẩu">
            </div>

            <div id="errorMessage" class="text-red-600 text-sm mt-3 flex items-center justify-center" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                </svg>
                <span id="errorText"></span>
            </div>

            <div>
                <button type="submit" id="registerSubmitButton"
                        class="w-full mt-4 p-3 bg-primary-600 text-white rounded-lg hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-all duration-300 font-semibold text-lg flex items-center justify-center hover:shadow-glow transform hover:-translate-y-1 active:translate-y-0 active:shadow-none">
                    <span class="button-text">Đăng ký</span>
                    <svg class="animate-spin h-5 w-5 ml-3 text-white button-spinner hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </form>

        <p class="mt-8 text-center text-sm text-secondary-500">
            Đã có tài khoản? <a href="login.html" class="font-medium text-primary-600 hover:text-primary-700 hover:underline">Đăng nhập ngay</a>
        </p>

        <p class="mt-6 text-center text-xs text-secondary-400">
            &copy; <span id="copyrightYear">2025</span> Trường Đại học Ngân hàng TP.HCM | Trợ lý AI Tuyển Sinh
        </p>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full flex items-center justify-center z-50 hidden animate-fade-in">
        <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-sm mx-auto transform transition-all scale-95 opacity-0 modal-content">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
                    <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 class="text-lg leading-6 font-medium text-gray-900 mb-2">Đăng ký thành công!</h3>
                <p class="text-sm text-gray-500 mb-6">Tài khoản của bạn đã được tạo. Bạn có thể đăng nhập ngay bây giờ.</p>
                <div>
                    <button id="modalOkButton" class="w-full px-4 py-2 bg-primary-600 text-white text-base font-medium rounded-md shadow-sm hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors">
                        OK, Đăng nhập
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Load core register function first -->
    <script src="js/register.js"></script>
    <!-- Load page-specific logic -->
    <script src="js/register-page.js"></script>

</body>
</html>
