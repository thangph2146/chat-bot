<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Trợ lý AI HUB</title>
    <link rel="icon" href="https://tuyensinh.hub.edu.vn/images/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="css/tailwind.config.js"></script>
    <!-- Link tới file CSS tùy chỉnh -->
    <link rel="stylesheet" href="css/login.css">
    <!-- Tải thư viện Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="font-sans flex items-center justify-center min-h-screen px-4 bg-gradient-to-br from-primary-50 via-secondary-50 to-white">
    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-primary-600 animate-fade-in">
        <div class="flex justify-center mb-8">
            <img src="logo/logo.png" alt="Logo HUB" class="h-20 transition-transform duration-300 hover:scale-105" style="width: 15rem; height: 100%">
        </div>
        <h2 class="text-3xl font-bold text-center text-primary-600 mb-8">Đăng nhập Trợ lý AI</h2>

        <form id="loginForm" class="space-y-6">
            <div class="relative">
                <label for="email" class="sr-only">Email</label>
                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                   <svg class="h-5 w-5 input-icon transition-colors duration-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                     <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                     <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
                   </svg>
                </span>
                <input type="email" id="email" name="email" required autocomplete="email"
                       class="w-full pl-10 pr-4 py-3 border border-secondary-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 shadow-sm transition-all duration-300 placeholder-secondary-400"
                       placeholder="Địa chỉ email">
            </div>
            <div class="relative">
                <label for="password" class="sr-only">Mật khẩu</label>
                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                    <svg class="h-5 w-5 input-icon transition-colors duration-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                      </svg>
                </span>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                       class="w-full pl-10 pr-4 py-3 border border-secondary-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 shadow-sm transition-all duration-300 placeholder-secondary-400"
                       placeholder="Mật khẩu">
            </div>

            <div id="errorMessage" class="text-red-600 text-sm mt-3 flex items-center justify-center" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                  </svg>
                <span id="errorText"></span>
            </div>

            <div>
                <button type="submit" id="loginSubmitButton"
                        class="w-full mt-4 p-3 bg-primary-600 text-white rounded-lg hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-all duration-300 font-semibold text-lg flex items-center justify-center hover:shadow-glow transform hover:-translate-y-1 active:translate-y-0 active:shadow-none">
                    <span class="button-text">Đăng nhập</span>
                    <svg class="animate-spin h-5 w-5 ml-3 text-white button-spinner hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </form>

        <div class="relative my-6 h-px bg-secondary-200">
            <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 transform bg-white px-2">
              <span class="text-sm font-medium text-secondary-500">Hoặc đăng nhập với</span>
            </div>
          </div>

          <div>
            <!-- Div này sẽ chứa nút Google Sign-In được render bởi thư viện -->
            <div id="googleSignInButtonDiv" class="flex justify-center"></div>
          </div>

        <p class="mt-8 text-center text-sm text-secondary-500">
            Chưa có tài khoản? <a href="register.html" class="font-medium text-primary-600 hover:text-primary-700 hover:underline">Đăng ký ngay</a>
        </p>

        <p class="mt-6 text-center text-xs text-secondary-400">
             &copy; <span id="copyrightYear">2025</span> Trường Đại học Ngân hàng TP.HCM | Trợ lý AI Tuyển Sinh
        </p>
    </div>

    <script type="module" src="js/login/login-page.js"></script>
    <!-- Cần GOOGLE_CLIENT_ID được định nghĩa trước khi login-page.js chạy nếu không dùng import/export -->
    <!-- Hoặc đảm bảo login-page.js import GOOGLE_CLIENT_ID từ config.js -->
</body>
</html>
