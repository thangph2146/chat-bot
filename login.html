<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Đại học Ngân hàng TP.HCM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://tuyensinh.hub.edu.vn/wp-content/uploads/2022/06/cropped-favicon-32x32.png" sizes="32x32">
    <!-- Script và tích hợp TW Config -->
    <script src="js/auth-config.js"></script>
    <script src="js/login.js"></script>
    <script src="tailwind.config.js"></script>
</head>
<body class="font-sans min-h-screen flex items-center justify-center bg-secondary-50">
    <div class="container mx-auto p-4 max-w-md">
        <!-- Card Đăng nhập -->
        <div class="bg-white rounded-2xl shadow-container p-6 md:p-8 border-t-4 border-primary-600 animate-fade-in">
            <!-- Header -->
            <div class="text-center mb-8">
                <img src="logo/logo.png" alt="Logo HUB" class="h-16 mx-auto mb-4 transition-transform duration-300 hover:scale-105">
                <h1 class="text-2xl md:text-3xl font-bold text-primary-600 mb-2">Đăng nhập</h1>
                <p class="text-secondary-600">Đăng nhập để truy cập Trợ lý AI của Đại học Ngân hàng TP.HCM</p>
            </div>

            <!-- Form Đăng nhập -->
            <form id="login-form" class="space-y-4">
                <!-- Email Field -->
                <div class="space-y-2">
                    <label for="email" class="block text-sm font-medium text-secondary-700">Địa chỉ email</label>
                    <input type="email" id="email" name="email" class="w-full p-3 border border-secondary-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-600 focus:border-transparent transition-all" placeholder="example@example.com" required>
                </div>

                <!-- Password Field -->
                <div class="space-y-2">
                    <div class="flex justify-between">
                        <label for="password" class="block text-sm font-medium text-secondary-700">Mật khẩu</label>
                        <a href="forgotpassword.html" class="text-sm text-primary-600 hover:text-primary-500 hover:underline">Quên mật khẩu?</a>
                    </div>
                    <div class="relative">
                        <input type="password" id="password" name="password" class="w-full p-3 border border-secondary-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-600 focus:border-transparent transition-all" placeholder="••••••••" required>
                        <button type="button" id="password-toggle" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-secondary-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 eye-open" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 eye-closed hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Remember Me Checkbox -->
                <div class="flex items-center">
                    <input type="checkbox" id="remember" name="remember" class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-secondary-300 rounded">
                    <label for="remember" class="ml-2 block text-sm text-secondary-700">Ghi nhớ đăng nhập</label>
                </div>

                <!-- Login Button -->
                <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-3 px-4 rounded-lg transition-all hover:shadow-glow focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 btn-primary">
                    Đăng nhập
                </button>
            </form>

            <!-- Divider -->
            <div class="my-6 flex items-center">
                <div class="flex-grow border-t border-secondary-300"></div>
                <span class="mx-4 text-secondary-500 text-sm">hoặc</span>
                <div class="flex-grow border-t border-secondary-300"></div>
            </div>

            <!-- Login with Google -->
            <button type="button" class="w-full flex items-center justify-center gap-3 bg-white border border-secondary-300 hover:bg-secondary-50 text-secondary-800 font-medium py-3 px-4 rounded-lg transition-all hover:shadow-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary-400 btn-google">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 488 512">
                    <path fill="#4285F4" d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z"/>
                </svg>
                Đăng nhập với Google
            </button>

            <!-- Sign Up Link -->
            <div class="mt-6 text-center">
                <p class="text-secondary-600">Chưa có tài khoản? <a href="register.html" class="text-primary-600 hover:text-primary-500 hover:underline font-medium">Đăng ký ngay</a></p>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-6 text-center text-xs text-secondary-500 animate-fade-in">
            &copy; 2023 Đại học Ngân hàng TP.HCM | Trợ lý AI được phát triển bởi <a href="https://hub.edu.vn" class="text-primary-600 hover:underline">Hub.edu.vn</a>
        </div>
        <div class="mt-2 text-center text-xs text-secondary-500 animate-fade-in">
            Quản lý bởi: Phòng Công Nghệ Thông Tin
        </div>
    </div>

    <style>
        /* Tùy chỉnh focus styles */
        input:focus, button:focus {
            outline: none;
        }
        
        /* Hiệu ứng khi hover vào các button */
        button:hover {
            transform: translateY(-1px);
        }
        
        /* Hiệu ứng ripple */
        @keyframes ripple {
            to {
                transform: scale(2.5);
                opacity: 0;
            }
        }
        
        /* Hiệu ứng fade-in */
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Shadow container */
        .shadow-container {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        /* Glow effect */
        .hover\:shadow-glow:hover {
            box-shadow: 0 0 15px rgba(var(--color-primary-500), 0.5);
        }
        
        /* Hover shadow */
        .hover\:shadow-hover:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</body>
</html>
