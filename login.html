<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Trợ lý AI HUB</title>
    <link rel="icon" href="https://tuyensinh.hub.edu.vn/images/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="tailwind.config.js"></script>
    <style>
        body {
            background-color: #f3f4f6; /* Màu nền giống trang chính */
        }
    </style>
</head>
<body class="font-sans flex items-center justify-center min-h-screen px-4">
    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-xl w-full max-w-md border-t-4 border-primary-600">
        <div class="flex justify-center mb-6">
            <img src="logo/logo.png" alt="Logo HUB" class="h-20">
        </div>
        <h2 class="text-2xl font-bold text-center text-primary-600 mb-6">Đăng nhập Trợ lý AI</h2>

        <form id="loginForm" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-secondary-700 mb-1">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email"
                       class="w-full px-4 py-2 border border-secondary-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent shadow-sm transition-all duration-300"
                       placeholder="Nhập địa chỉ email">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-secondary-700 mb-1">Mật khẩu</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                       class="w-full px-4 py-2 border border-secondary-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent shadow-sm transition-all duration-300"
                       placeholder="Nhập mật khẩu">
            </div>

            <div id="errorMessage" class="text-red-600 text-sm mt-2 text-center" style="display: none;">
                <!-- Thông báo lỗi sẽ được cập nhật bởi script -->
            </div>

            <div>
                <button type="submit"
                        class="w-full mt-2 p-3 bg-primary-600 text-white rounded-lg hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-all duration-300 font-semibold hover:shadow-glow transform hover:-translate-y-0.5">
                    Đăng nhập
                </button>
            </div>
        </form>

        <p class="mt-6 text-center text-sm text-secondary-500">
            Chưa có tài khoản? <a href="register.html" class="text-primary-600 hover:underline">Đăng ký ngay</a>
        </p>

        <p class="mt-4 text-center text-sm text-secondary-500">
            &copy; 2025 Trường Đại học Ngân hàng TP.HCM | Trợ lý AI Tuyển Sinh được phát triển bởi Phòng Quản lý Công nghệ thông tin
        </p>
    </div>

    <!-- Load core login functions first -->
    <script src="js/login.js"></script>
    <!-- Load page-specific logic -->
    <script src="js/login-page.js"></script>

</body>
</html>
