<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Trợ lý AI HUB</title>
    <link rel="icon" href="https://tuyensinh.hub.edu.vn/images/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="css/tailwind.config.js"></script>
    <!-- Link tới file CSS tùy chỉnh -->
    <link rel="stylesheet" href="css/login.css">
    <!-- Tải thư viện Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="font-sans flex items-center justify-center min-h-screen px-4 bg-gradient-to-br from-primary-50 via-secondary-50 to-white">
    <div class="bg-white p-10 md:p-12 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-primary-600 animate-fade-in">
        <div class="flex justify-center mb-8">
            <img src="logo/logo.png" alt="Logo HUB" class="h-20 transition-transform duration-300 hover:scale-105" style="width: 15rem; height: 100%">
        </div>
        <h2 class="text-2xl font-bold text-center text-primary-600 mb-6">Chào mừng bạn đến với trợ lý AI Tuyển Sinh</h2>

        <!-- Form đăng nhập Email/Password đã bị xóa -->
        <!-- <form id="loginForm" class="space-y-6"> ... </form> -->

        <!-- Phần thông báo lỗi - Di chuyển lên gần nút Google hơn -->
        <div id="errorMessage" class="text-red-600 text-sm mb-4 flex items-center justify-center" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
              </svg>
            <span id="errorText"></span>
        </div>

        <!-- Divider "Hoặc đăng nhập với" đã bị xóa -->
        <!-- <div class="relative my-6 h-px bg-secondary-200"> ... </div> -->

          <div class="mt-8 mb-6"> <!-- Thêm khoảng cách trên và dưới cho nút -->
            <!-- Div này sẽ chứa nút Google Sign-In được render bởi thư viện -->
            <div id="googleSignInButtonDiv" class="flex justify-center"></div>
          </div>
           <h2 class="text-lg font-medium text-center text-secondary-600 mt-6">Đăng nhập ngay để được tư vấn bởi trợ lý AI Tuyển Sinh</h2>

        <!-- Link đăng ký đã bị xóa -->
        <!-- <p class="mt-8 text-center text-sm text-secondary-500"> ... </p> -->

        <p class="mt-10 text-center text-xs text-secondary-400"> <!-- Giữ nguyên margin-top -->
             &copy; <span id="copyrightYear">2025</span> Trường Đại học Ngân hàng TP.HCM | Trợ lý AI Tuyển Sinh
        </p>
    </div>

    <script type="module" src="js/login/login-page.js"></script>
    <!-- Cần GOOGLE_CLIENT_ID được định nghĩa trước khi login-page.js chạy nếu không dùng import/export -->
    <!-- Hoặc đảm bảo login-page.js import GOOGLE_CLIENT_ID từ config.js -->
</body>
</html>
