    <!-- Hiệu ứng ripple cho nút -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rippleButtons = document.querySelectorAll('#clearHistoryButton, #newChatButton, #recordButton, #sendButton');
            
            rippleButtons.forEach(button => {
                button.addEventListener('click', function(e) {
                    const x = e.clientX - e.target.getBoundingClientRect().left;
                    const y = e.clientY - e.target.getBoundingClientRect().top;
                    
                    const ripple = document.createElement('span');
                    ripple.classList.add('absolute', 'rounded-full', 'bg-white', 'bg-opacity-40', 'transform', 'scale-0', 'animate-[ripple_0.6s_linear]');
                    ripple.style.left = `${x}px`;
                    ripple.style.top = `${y}px`;
                    
                    this.appendChild(ripple);
                    
                    setTimeout(() => {
                        ripple.remove();
                    }, 600);
                });
            });

            // Thêm các câu hỏi gợi ý
            const suggestionButtons = document.querySelectorAll('#chatContainer button');
            suggestionButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const messageInput = document.getElementById('messageInput');
                    messageInput.value = this.querySelector('span').textContent;
                    messageInput.focus();
                    // Thêm hiệu ứng khi nhấn vào gợi ý
                    this.classList.add('bg-primary-200', 'scale-95');
                    setTimeout(() => {
                        this.classList.remove('bg-primary-200', 'scale-95');
                    }, 200);
                });
            });

            // Khai báo biến messageInput một lần ở phạm vi toàn cục
            const messageInput = document.getElementById('messageInput');
            
            // Thêm hiệu ứng gõ phím cho input
            messageInput.addEventListener('input', function() {
                this.classList.add('border-primary-400');
                setTimeout(() => {
                    this.classList.remove('border-primary-400');
                }, 300);
            });

            // Hàm hiển thị tin nhắn dạng bong bóng chat
            function addMessageToChat(message, isUserMessage) {
                const chatMessages = document.getElementById('chatMessages');
                const welcomeMessage = document.getElementById('welcomeMessage');
                
                // Ẩn thông điệp chào mừng khi có tin nhắn đầu tiên
                if (welcomeMessage && !welcomeMessage.classList.contains('hidden')) {
                    welcomeMessage.classList.add('hidden');
                }
                
                // Hiển thị khu vực tin nhắn
                chatMessages.classList.remove('hidden');
                
                // Tạo phần tử tin nhắn
                const messageElement = document.createElement('div');
                
                if (isUserMessage) {
                    // Tin nhắn người dùng - bên phải
                    messageElement.className = 'flex flex-col items-end space-y-1 animate-fade-in';
                    
                    // Thời gian
                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'text-xs text-secondary-500 mr-2';
                    timeDiv.textContent = '11:10';
                    messageElement.appendChild(timeDiv);

                    // Nội dung tin nhắn
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'bg-primary-600 text-white px-4 py-2 rounded-t-2xl rounded-bl-2xl max-w-[85%] shadow-sm';
                    messageDiv.textContent = message;
                    messageElement.appendChild(messageDiv);
                } else {
                    // Tin nhắn bot - bên trái
                    messageElement.className = 'flex flex-col space-y-1 animate-fade-in';
                    
                    // Thời gian
                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'text-xs text-secondary-500 ml-2';
                    timeDiv.textContent = '11:10';
                    messageElement.appendChild(timeDiv);

                    // Nội dung tin nhắn với avatar
                    const messageRow = document.createElement('div');
                    messageRow.className = 'flex items-start';
                    
                    const messageContent = document.createElement('div');
                    messageContent.className = 'bg-secondary-100 text-secondary-800 px-4 py-2 rounded-t-2xl rounded-br-2xl max-w-[85%] shadow-sm';
                    messageContent.textContent = message;
                    
                    messageRow.appendChild(messageContent);
                    messageElement.appendChild(messageRow);
                }
                
                chatMessages.appendChild(messageElement);
                
                // Cuộn xuống tin nhắn mới nhất
                setTimeout(() => {
                    const chatContainer = document.getElementById('chatContainer');
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }, 100);
            }

            // Hàm hiển thị hiệu ứng đang trả lời
            function showTypingIndicator() {
                const typingIndicator = document.getElementById('typingIndicator');
                typingIndicator.classList.remove('hidden');
                
                // Cuộn xuống dưới cùng
                const chatContainer = document.getElementById('chatContainer');
                setTimeout(() => {
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }, 100);
            }

            // Hàm ẩn hiệu ứng đang trả lời
            function hideTypingIndicator() {
                const typingIndicator = document.getElementById('typingIndicator');
                typingIndicator.classList.add('hidden');
            }

            // Sự kiện gửi tin nhắn để thử nghiệm giao diện (sẽ được thay thế bởi API thực tế)
            const sendButton = document.getElementById('sendButton');
            
            sendButton.addEventListener('click', () => {
                const messageText = messageInput.value.trim();
                if (messageText) {
                    // Thêm tin nhắn của người dùng
                    addMessageToChat(messageText, true);
                    messageInput.value = '';
                    
                    // Hiển thị hiệu ứng đang trả lời sau một khoảng trễ nhỏ
                    setTimeout(() => {
                        showTypingIndicator();
                        
                        // Mô phỏng phản hồi từ chatbot sau một khoảng thời gian
                        setTimeout(() => {
                            hideTypingIndicator();
                            addMessageToChat('Xin chào! Tôi là Trợ lý AI của Đại học Ngân hàng TP.HCM. Tôi có thể giúp bạn trả lời các câu hỏi về tuyển sinh, chương trình đào tạo, học phí, và các thông tin khác về trường. Bạn cần hỗ trợ gì?', false);
                        }, 2000);
                    }, 500);
                }
            });

            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendButton.click();
                }
            });
        });
    </script>

    <style>

        ::-webkit-scrollbar {
            width: 6px;

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #b42c1c;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #872115;
        }
        
        /* Hiệu ứng ripple */
        @keyframes ripple {
            to {
                transform: scale(2.5);
                opacity: 0;
            }
        }
        
        /* Hiệu ứng fade-out cho thông báo */
        .fade-out {
            animation: fadeOut 0.3s forwards;
        }
        
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        
        /* Style cho bubble chat */
        #chatMessages > div {
            transition: all 0.3s ease;
            transform-origin: bottom;
        }
        
        #chatMessages > div:hover {
            transform: translateY(-2px);
        }
        
        /* Style cho tin nhắn của bot */
        #chatMessages > div:not(.items-end) > div:last-child > div {
            position: relative;
        }
        
        #chatMessages > div:not(.items-end) > div:last-child > div::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: -8px;
            width: 16px;
            height: 16px;
            background: #f1f5f9;
            border-radius: 0 0 16px 0;
            clip-path: polygon(0 0, 100% 100%, 100% 0);
        }
        
        /* Style cho tin nhắn của người dùng */
        #chatMessages > div.items-end > div:last-child {
            position: relative;
        }
        
        #chatMessages > div.items-end > div:last-child::before {
            content: '';
            position: absolute;
            bottom: 0;
            right: -8px;
            width: 16px;
            height: 16px;
            background: #b42c1c;
            border-radius: 0 0 0 16px;
            clip-path: polygon(0 100%, 0 0, 100% 0);
        }
        
        /* Hiệu ứng loading cho typing indicator */
        #typingIndicator .animate-bounce {
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        /* Hiệu ứng cho tin nhắn mới */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .animate-pop-in {
            animation: popIn 0.3s forwards;
        }
        
        /* Style cho khu vực nhắn tin */
        #messageInput:focus {
            box-shadow: 0 0 0 2px rgba(180, 44, 28, 0.2);
        }
        
        /* Style cho nút gửi tin nhắn */
        #sendButton:hover svg {
            transform: translateX(2px);
            transition: transform 0.2s ease;
        }
        
        /* Style cho bubble khi hover */
        #chatMessages > div > div:last-child:hover {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
